<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Foundations: Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div id="container-calculator">
            <div id="calculator-screen-container">
                <div id="calculator-screen-main">
                    <div id="answer-value" class="value-box">Text Here</div>
                    <div id="solving-value" class="value-box">12345</div>
                </div>
            </div>
            <div id="calculator-buttons">
                <div id="buttons-top">
                    <button class="top-button" id="btn-clear">AC</button>
                    <button class="top-button" id="btn-erase">⌫</button>
                    <button class="top-button" id="btn-decimal">.</button>
                    <button class="top-button" id="btn-calculate">=</button>
                </div>
                <div id="buttons-main">
                    <div id="buttons-number">
                        <button class="number-button" id="btn-9">9</button>
                        <button class="number-button" id="btn-8">8</button>
                        <button class="number-button" id="btn-7">7</button>
                        <button class="number-button" id="btn-6">6</button>
                        <button class="number-button" id="btn-5">5</button>
                        <button class="number-button" id="btn-4">4</button>
                        <button class="number-button" id="btn-3">3</button>
                        <button class="number-button" id="btn-2">2</button>
                        <button class="number-button" id="btn-1">1</button>
                        <button class="number-button" id="btn-0">0</button>
                    </div>
                    <div id="buttons-operation">
                        <button class="op-button" id="btn-divide">÷</button>
                        <button class="op-button" id="btn-multiply">×</button>
                        <button class="op-button" id="btn-subtract">-</button>
                        <button class="op-button" id="btn-add">+</button>
                    </div>
                </div>
            </div>
        </div>
        
    </body>
</html>
